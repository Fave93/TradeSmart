<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - TradeSmart</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="container">

  <nav>
    <a href="../index.html">Home</a> |
    <a href="market.html">Market</a> |
    <a href="portfolio.html">Portfolio</a> |
    <a href="transactions.html">Transactions</a> |
    <a href="login.html">Login</a> |
    <a href="register.html">Register</a>
  </nav>

  <hr>

  <h1>Login</h1>
  <p class="small">Sign in with your username or email.</p>

  <div class="card center-card">
    <label for="usernameOrEmail">Username or Email</label>
    <input id="usernameOrEmail" type="text" placeholder="Username or Email" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Password" />

    <button id="loginBtn" type="button">Login</button>
    <p id="msg" class="small"></p>
  </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>

<script>
  async function doLogin() {
    try {
      setStatus("msg", "Logging in...");

      const usernameOrEmail = document.getElementById("usernameOrEmail").value.trim();
      const password = document.getElementById("password").value;

      if (!usernameOrEmail || !password) {
        setStatus("msg", "Enter your username/email and password.", "error");
        return;
      }

      const result = await API.loginUser({ usernameOrEmail, password });

      setCurrentUserId(result.user.user_id);
      setRole(result.user.role || "customer");

      setStatus("msg", result.message, "success");

      setTimeout(() => {
        window.location.href = "market.html";
      }, 700);
    } catch (e) {
      setStatus("msg", e.message || "Login failed", "error");
    }
  }

  document.getElementById("loginBtn").addEventListener("click", doLogin);
</script>
</body>
</html>
