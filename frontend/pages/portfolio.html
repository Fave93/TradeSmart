<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio - TradeSmart</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="container">

  <nav>
    <a href="../index.html">Home</a> |
    <a href="market.html">Market</a> |
    <a href="portfolio.html">Portfolio</a> |
    <a href="transactions.html">Transactions</a> |
    <a href="login.html">Login</a> |
    <a href="register.html">Register</a>
  </nav>

  <hr>

  <h1>Portfolio</h1>
  <p class="small">Cash account + holdings with current market value.</p>

  <p id="status" class="small">Loading portfolio...</p>

  <div class="card" id="summary"></div>

  <div class="card">
    <h3>Cash Account</h3>

    <div class="row">
      <div class="col">
        <label for="depositAmount">Deposit Amount</label>
        <input id="depositAmount" type="number" min="0.01" step="0.01" value="100.00" />
        <button id="depositBtn" type="button">Deposit</button>
      </div>

      <div class="col">
        <label for="withdrawAmount">Withdraw Amount</label>
        <input id="withdrawAmount" type="number" min="0.01" step="0.01" value="50.00" />
        <button id="withdrawBtn" type="button">Withdraw</button>
      </div>
    </div>

    <p id="cashMsg" class="small"></p>
  </div>

  <h3>Holdings</h3>
  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Company</th>
        <th>Shares</th>
        <th>Current Price</th>
        <th>Market Value</th>
      </tr>
    </thead>
    <tbody id="holdingsBody"></tbody>
  </table>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>

<script>
  const userId = getCurrentUserId();

  async function loadPortfolio() {
    try {
      setStatus("status", "Loading portfolio...");

      const p = await API.getPortfolio(userId);

      const user = p.user || {};
      const holdings = Array.isArray(p.holdings) ? p.holdings : [];

      let totalStockValue = 0;
      holdings.forEach(h => {
        totalStockValue += Number(h.total_value || 0);
      });

      const cash = Number(user.cash_balance || 0);
      const totalAccountValue = cash + totalStockValue;

   document.getElementById("summary").innerHTML = `
  <h3>Account Summary</h3>
  <div class="summary-grid">
    <div class="summary-box">
      <div class="label">User ID</div>
      <div class="value">${user.user_id || userId}</div>
    </div>
    <div class="summary-box">
      <div class="label">Name</div>
      <div class="value">${user.full_name || "N/A"}</div>
    </div>
    <div class="summary-box">
      <div class="label">Cash Balance</div>
      <div class="value">${money(cash)}</div>
    </div>
    <div class="summary-box">
      <div class="label">Stock Value</div>
      <div class="value">${money(totalStockValue)}</div>
    </div>
    <div class="summary-box">
      <div class="label">Account Total</div>
      <div class="value">${money(totalAccountValue)}</div>
    </div>
  </div>
`;

      const body = document.getElementById("holdingsBody");
      body.innerHTML = "";

      if (holdings.length === 0) {
        body.innerHTML = `<tr><td colspan="5">No holdings yet.</td></tr>`;
      } else {
        holdings.forEach(h => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${h.symbol || ""}</td>
            <td>${h.company_name || ""}</td>
            <td>${h.quantity ?? 0}</td>
            <td>${money(h.price)}</td>
            <td>${money(h.total_value)}</td>
          `;
          body.appendChild(tr);
        });
      }

      setStatus("status", "Portfolio loaded.", "success");
    } catch (e) {
      setStatus("status", e.message || "Failed to load portfolio", "error");
    }
  }

  async function doDeposit() {
    try {
      setStatus("cashMsg", "Depositing...");

      const amount = Number(document.getElementById("depositAmount").value);

      if (!amount || amount <= 0) {
        setStatus("cashMsg", "Enter a valid deposit amount.", "error");
        return;
      }

      const result = await API.depositCash({ userId, amount });
      setStatus("cashMsg", result.message || "Deposit successful", "success");
      await loadPortfolio();
    } catch (e) {
      setStatus("cashMsg", e.message || "Deposit failed", "error");
    }
  }

  async function doWithdraw() {
    try {
      setStatus("cashMsg", "Withdrawing...");

      const amount = Number(document.getElementById("withdrawAmount").value);

      if (!amount || amount <= 0) {
        setStatus("cashMsg", "Enter a valid withdrawal amount.", "error");
        return;
      }

      const result = await API.withdrawCash({ userId, amount });
      setStatus("cashMsg", result.message || "Withdrawal successful", "success");
      await loadPortfolio();
    } catch (e) {
      setStatus("cashMsg", e.message || "Withdraw failed", "error");
    }
  }

  document.getElementById("depositBtn").addEventListener("click", doDeposit);
  document.getElementById("withdrawBtn").addEventListener("click", doWithdraw);

  loadPortfolio();
</script>
</body>
</html>
