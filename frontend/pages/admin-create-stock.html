<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin - Create Stock</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="container">

  <nav>
    <a href="../index.html">Home</a> |
    <a href="market.html">Market</a> |
    <a href="admin-create-stock.html">Admin: Create Stock</a> |
    <a href="admin-market-hours.html">Admin: Market Hours</a> |
    <a href="admin-market-schedule.html">Admin: Schedule</a>
  </nav>

  <hr>

  <h1>Admin: Create Stock</h1>
  <p class="small">Create a new stock using company name, ticker, and initial price.</p>

  <div class="card">
    <label for="companyName">Company Name</label>
    <input id="companyName" type="text" placeholder="Example Corp" />

    <label for="ticker">Ticker</label>
    <input id="ticker" type="text" placeholder="EXMPL" />

    <label for="initialPrice">Initial Price</label>
    <input id="initialPrice" type="number" step="0.01" min="0.01" value="10.00" />

    <button id="createBtn" type="button">Create Stock</button>
    <p id="msg" class="small"></p>
  </div>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>

<script>
  async function createStock() {
    try {
      setStatus("msg", "Creating stock...");

      const companyName = document.getElementById("companyName").value.trim();
      const ticker = document.getElementById("ticker").value.trim().toUpperCase();
      const initialPrice = Number(document.getElementById("initialPrice").value);

      if (!companyName || !ticker || !initialPrice || initialPrice <= 0) {
        setStatus("msg", "Enter valid stock information.", "error");
        return;
      }

      const result = await API.adminCreateStock({
        companyName,
        ticker,
        initialPrice
      });

      setStatus("msg", result.message, "success");
    } catch (e) {
      setStatus("msg", e.message || "Create stock failed", "error");
    }
  }

  document.getElementById("createBtn").addEventListener("click", createStock);
</script>
</body>
</html>
