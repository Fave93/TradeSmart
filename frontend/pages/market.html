<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Market - TradeSmart</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
<div class="container">

  <nav>
    <a href="../index.html">Home</a> |
    <a href="market.html">Market</a> |
    <a href="portfolio.html">Portfolio</a> |
    <a href="transactions.html">Transactions</a> |
    <a href="login.html">Login</a> |
    <a href="register.html">Register</a> |
    <a href="admin-create-stock.html">Admin: Create Stock</a> |
    <a href="admin-market-hours.html">Admin: Market Hours</a> |
    <a href="admin-market-schedule.html">Admin: Schedule</a>
  </nav>

  <hr>

  <h1>Market</h1>
  <p class="small">Displays available stocks and allows users to buy or sell shares.</p>

  <p id="status" class="small">Loading stocks...</p>

  <div class="row">
    <div class="col card">
      <h3>Place Order</h3>

      <label for="tickerSelect">Ticker</label>
      <select id="tickerSelect"></select>

      <label for="orderType">Order Type</label>
      <select id="orderType">
        <option value="BUY">BUY</option>
        <option value="SELL">SELL</option>
      </select>

      <label for="shares">Shares</label>
      <input id="shares" type="number" min="1" value="1" />

      <button id="placeOrderBtn" type="button">Place Order</button>
      <p id="orderMsg" class="small"></p>
    </div>

    <div class="col card">
      <h3>Current User</h3>
      <p id="tradeInfo" class="small"></p>
    </div>
  </div>

  <h3>Available Stocks</h3>
  <table id="stocksTable">
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Company</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody id="stocksBody"></tbody>
  </table>

</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>

<script>
  const userId = getCurrentUserId();
  let latestStocks = [];

  document.getElementById("tradeInfo").textContent = `Current user: ${userId}`;

  async function loadStocks() {
    try {
      setStatus("status", "Loading stocks...");

      const stocks = await API.getStocks();
      latestStocks = Array.isArray(stocks) ? stocks : [];

      const tbody = document.getElementById("stocksBody");
      tbody.innerHTML = "";

      if (latestStocks.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3">No stocks available.</td></tr>`;
      } else {
        latestStocks.forEach(s => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${s.symbol || ""}</td>
            <td>${s.company_name || ""}</td>
            <td>${money(s.price)}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      const sel = document.getElementById("tickerSelect");
      sel.innerHTML = "";

      if (latestStocks.length === 0) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No stocks available";
        sel.appendChild(opt);
      } else {
        latestStocks.forEach(s => {
          const opt = document.createElement("option");
          opt.value = s.symbol;
          opt.textContent = `${s.symbol} - ${s.company_name}`;
          sel.appendChild(opt);
        });
      }

      setStatus("status", "Stocks loaded.", "success");
    } catch (e) {
      setStatus("status", e.message || "Failed to load stocks", "error");
    }
  }

  async function placeOrder() {
    try {
      const ticker = document.getElementById("tickerSelect").value;
      const type = document.getElementById("orderType").value;
      const shares = Number(document.getElementById("shares").value);

      if (!ticker) {
        setStatus("orderMsg", "Select a stock first.", "error");
        return;
      }

      if (!shares || shares <= 0) {
        setStatus("orderMsg", "Enter a valid number of shares.", "error");
        return;
      }

      setStatus("orderMsg", "Submitting order...");

      let result;

      if (type === "BUY") {
        result = await API.buyStock({ userId, ticker, shares });
      } else {
        result = await API.sellStock({ userId, ticker, shares });
      }

      setStatus("orderMsg", result.message || `${type} order completed.`, "success");
    } catch (e) {
      setStatus("orderMsg", e.message || "Order failed", "error");
    }
  }

  document.getElementById("placeOrderBtn").addEventListener("click", placeOrder);

  loadStocks();
</script>
</body>
</html>
